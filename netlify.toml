[build]
    command = "pnpm run build && pnpm run test:smoke"
    publish = "build/"

[build.environment]
    # Vite 8 requires Node 20.19+ or 22.12+. Netlify defaults to an older
    # version, so pin to current LTS here.
    NODE_VERSION = "22.12.0"
    # Skip Corepack signature verification — Node 22.12.0 bundles corepack
    # 0.30 whose key set predates pnpm 10.13+. See nodejs/corepack#612.
    COREPACK_INTEGRITY_KEYS = "0"
    # Install Playwright browsers inside node_modules so Netlify's build cache
    # picks them up (saves ~90MB / ~30s on warm builds).
    PLAYWRIGHT_BROWSERS_PATH = "0"
